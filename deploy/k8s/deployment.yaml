apiVersion: apps/v1
kind: Deployment
metadata:
  name: stranger
  labels:
    app: stranger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stranger
  template:
    metadata:
      labels:
        app: stranger
    spec:
      containers:
        - name: stranger
          image: stranger-chat:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8787
              name: http
          envFrom:
            - secretRef:
                name: stranger-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8787"
            - name: STATIC_DIR
              value: /app/dist
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          lifecycle:
            preStop:
              exec:
                # Allow drain window (align with SHUTDOWN_DRAIN_MS)
                command: ["sh", "-c", "sleep 2"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: stranger
spec:
  selector:
    app: stranger
  ports:
    - name: http
      port: 80
      targetPort: http
---
